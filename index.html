        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // add class to format popup if it contains media
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					// Delay to force the redraw
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}

        function pop_HospitalCerro_6(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: false, 
        });
        lay.addTo(map);
		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });
        setBounds();
        // guardar capas activas al iniciar el mapa
        var initialLayers = [];

        map.eachLayer(function(layer){
            initialLayers.push(layer);
        });

        var layerSearchControl = new L.Control.Search({
            layer: layer_Todaslasunidadesbusqueda_16,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'NOMBRE'
        });

        map.addControl(layerSearchControl);

        if (typeof url === 'undefined') {
            document.getElementsByClassName('search-button')[0].className += ' fa fa-binoculars';
        } else {
            document.getElementsByClassName('search-button')[1].className += ' fa fa-binoculars';
        }


        // -------- CONTROL DE MODO DE BUSQUEDA --------

        var SearchModeControl = L.Control.extend({

            options: {
                position: "bottomleft"
            },

            onAdd: function () {

                var container = L.DomUtil.create("div", "leaflet-bar leaflet-control");

                container.style.backgroundColor = "white";
                container.style.lineHeight = "1.2";
                container.style.fontSize = "12px";
                container.style.margin = "10px";
                container.style.position = "relative";
                container.style.padding = "0";
                container.style.minWidth = "0";
                container.style.width = "30px";

                container.innerHTML =
                    '<a href="#" class="search-mode-toggle" ' +
                        'style="display:block;width:30px;height:30px;line-height:30px;text-align:center;text-decoration:none;color:black;">' +
                        '<i class="fa fa-filter"></i>' +
                    '</a>' +
                    '<div class="search-mode-panel" ' +
                        'style="display:none;position:absolute;left:0;bottom:30px;background:white;padding:6px 8px;min-width:120px;box-shadow:0 1px 5px rgba(0,0,0,0.4);z-index:1000;">' +
                            '<div style="font-weight:600;margin-bottom:4px;">Buscar por</div>' +
                            '<label style="display:block;cursor:pointer;margin-bottom:3px;">' +
                                '<input type="radio" name="search-mode" value="NOMBRE" checked> Nombre' +
                            '</label>' +
                            '<label style="display:block;cursor:pointer;">' +
                                '<input type="radio" name="search-mode" value="ALIAS"> Alias' +
                            '</label>' +
                    '</div>';

                L.DomEvent.disableClickPropagation(container);
                L.DomEvent.disableScrollPropagation(container);

                var toggle = container.querySelector('.search-mode-toggle');
                var panel = container.querySelector('.search-mode-panel');

                L.DomEvent.on(toggle, 'click', function (ev) {

                    L.DomEvent.stop(ev);

                    if (panel.style.display === 'none') {
                        panel.style.display = 'block';
                    } else {
                        panel.style.display = 'none';
                    }

                });

                var radios = container.querySelectorAll('input[name="search-mode"]');

                radios.forEach(function (radio) {

                    radio.addEventListener('change', function () {

                        layerSearchControl.options.propertyName = this.value;

                        var input = document.querySelector(
                            '.leaflet-control-search input.search-input'
                        );

                        if (input) {

                            if (this.value === 'NOMBRE') {
                                input.placeholder = 'Buscar por nombre';
                            } else if (this.value === 'ALIAS') {
                                input.placeholder = 'Buscar por alias';
                            }

                            input.value = '';
                        }

                    });

                });

                return container;
            }
        });

        map.addControl(new SearchModeControl());
        </script>
    </body>
